<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Day 4 - Flexbox</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f4f4;
}

h1{
    text-align:center;
    margin:30px 0;
    color:#0d6efd;
}

/* Flex Container */
.container{
    display:flex;
    justify-content:space-evenly;
    align-items:center;
    flex-wrap:wrap;
    gap:20px;
    padding:20px;
}

/* Flex Items */
.card{
    width:220px;
    height:180px;
    background:white;
    border-radius:12px;
    box-shadow:0 8px 15px rgba(0,0,0,0.2);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

button{
    margin-top:15px;
    padding:10px 18px;
    background:#0d6efd;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#084298;
}

</style>
</head>
<body>

<h1>CSS Flexbox Practice</h1>

<div class="container">

    <div class="card">
        <h2>HTML</h2>
        <button>Learn</button>
    </div>

    <div class="card">
        <h2>CSS</h2>
        <button>Learn</button>
    </div>

    <div class="card">
        <h2>JavaScript</h2>
        <button>Learn</button>
    </div>

</div>

</body>
</html>
