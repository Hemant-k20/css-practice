<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Day 5 - Grid</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
    padding:40px;
}

h1{
    text-align:center;
    margin-bottom:30px;
    color:#2563eb;
}

/* Grid Container */
.container{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:20px;
}

/* Grid Items */
.box{
    background:#2563eb;
    color:white;
    padding:50px;
    text-align:center;
    font-size:22px;
    border-radius:12px;
    transition:.3s;
}

.box:hover{
    background:#1d4ed8;
    transform:scale(1.05);
}

</style>

</head>
<body>

<h1>CSS Grid Practice</h1>

<div class="container">

<div class="box">1</div>
<div class="box">2</div>
<div class="box">3</div>
<div class="box">4</div>
<div class="box">5</div>
<div class="box">6</div>

</div>

</body>
</html>
